<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fjalla+One&family=Work+Sans&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <title>Formulário de pesquisa</title>
</head>
<body>
    <main>
        <header>
            <img src="img/mosten.png" alt="Logo Mosten">
            <h1>Cadastre-se no nosso Banco de Talentos</h1>
        </header>

        <section>
            <form action="sucesso.html" method="get">

                <fieldset>
                    <!-- DADOS PESSOAIS -->
                    <legend>Dados Pessoais</legend>

                    <label for="name">Nome Completo *</label>
                    <input id="name" type="text" name="userName" required placeholder="Digite o seu nome completo"> 
                    <br>
                    <label for="birthDate">Data de Nascimento *</label>
                    <input id="birthDate" type="date" name="userBirthDate" required>
                    <br>
                    <label for="email">E-mail *</label>
                    <input id="email" type="email" name="userEmail" placeholder="exemplo@gmail.com" required>
                    <br>
                    <label for="phoneNumber">Telefone *</label>
                    <input id="phoneNumber" type="tel" name="userPhoneNumber" pattern="[0-9]{11}" placeholder="DDD + Números sem espaços" maxlength="11" required>
                    <br>
                    <label for="image">Upload de currículo (Opcional)</label>
                    <input id="image" type="file" accept="application/pdf" name="userImage">
                    <br>
                </fieldset>

                <fieldset>
                    <!-- Perfil -->
                    <legend>Perfil</legend>
                    <p>Gênero *</p>

                    <input id="fem" type="radio" name="userGender" value="Feminino" required>
                    <label for="fem">Feminino</label>
                    <br>
                    <input id="masc" type="radio" name="userGender" value="Masculino">
                    <label for="masc">Masculino</label>
                    <br>
                    <input id="notInformed" type="radio" name="userGender" value="Não informado">
                    <label for="notInformed">Prefiro não informar</label>
                    <br>
                    <br>
                    
                    <label for="maritalStatus">Estado Civil *</label>
                    <select id="maritalStatus" name="userMaritalStatus" id="" required>
                        <option value="" disabled selected hidden>
                            Escolha uma opção
                        </option>
                        <option value="Casado">Casado</option>
                        <option value="Solteiro">Solteiro</option>
                        <option value="Divorciado">Divorciado</option>
                        <option value="Viuvo">Viúvo</option>
                    </select>
                    <br>

                    <label for="state">Estado *</label>
                    <select id="state" name="userState" id="" required>
                        <option value="" disabled selected hidden>
                            Escolha uma opção
                        </option>
                        <option value="acre">Acre</option>
                        <option value="alagoas">Alagoas</option>
                        <option value="amapa">Amapá</option>
                        <option value="amazonas">Amazonas</option>
                        <option value="bahia">Bahia</option>
                        <option value="ceara">Ceará</option>
                        <option value="distritoFederal">Distrito Federal</option>
                        <option value="espiritoSanto">Espirito Santo</option>
                        <option value="goias">Goiás</option>
                        <option value="maranhao">Maranhão</option>
                        <option value="matoGrossoDoSul">Mato Grosso do Sul</option>
                        <option value="matoGrosso">Mato Grosso</option>
                        <option value="minasGerais">Minas Gerais</option>
                        <option value="para">Pará</option>
                        <option value="paraiba">Paraíba</option>
                        <option value="parana">Paraná</option>
                        <option value="pernambuco">Pernambuco</option>
                        <option value="piaui">Piauí</option>
                        <option value="rioDeJaneiro">Rio de Janeiro</option>
                        <option value="rioGrandeDoNorte">Rio Grande do Norte</option>
                        <option value="rioGrandeDoSul">Rio Grande do Sul</option>
                        <option value="rondonia">Rondônia</option>
                        <option value="roraima">Roraima</option>
                        <option value="santaCatarina">Santa Catarina</option>
                        <option value="saoPaulo">São Paulo</option>
                        <option value="sergipe">Sergipe</option>
                        <option value="tocantins">Tocantins</option>
                    </select>

                    <br>
                    <label for="city">Cidade *</label>
                    <input id="city" type="text" name="userCity" placeholder="Digite sua cidade" required>
                </fieldset>

                <fieldset>
                    <legend>Redes Sociais</legend>
                    <p>Adicione o link de suas redes sociais (Opcional)</p>

                    <label for="instagram">Instagram</label>
                    <input id="instagram" type="url" name="instagram">
                    <br>
                    <label for="facebook">Facebook</label>
                    <input id="facebook" type="url" name="facebook">
                    <br>
                    <label for="linkedin">LinkedIn</label>
                    <input id="linkedin" type="url" name="linkedin">
                    <br>
                    <label for="github">GitHub</label>
                    <input id="github" type="url" name="github">
                    <br>
                </fieldset>

                <fieldset>
                    <legend>Opinião</legend>
                    <p>O que você achou da qualidade do nosso processo seletivo? (Opcional)</p>
                    
                    <input type="radio" id="otimo" name="userServiceOpinion" value="otima">
                    <label for="otimo">Ótimo</label>
                    <br>
                    <input type="radio" id="boa" name="userServiceOpinion" value="boa">
                    <label for="boa">Bom</label>
                    <br>
                    <input type="radio" id="regular" name="userServiceOpinion" value="regular">
                    <label for="regular">Regular</label>
                    <br>
                    <input type="radio" id="ruim" name="userServiceOpinion" value="ruim">
                    <label for="ruim">Ruim</label>
                    <br>
                    <label for="comment">Escreva sua opinião</label>
                    <br>
                    <textarea name="userCommente" id="comment" placeholder="Digite o sua opinião..."></textarea>
                </fieldset>

                <fieldset>
                    <legend>Confirmações</legend>
                    <input type="checkbox" name="userLgpd" id="userLgpdTerm" value="accepted" required>
                    <label for="userLgpdTerm">Li e concordo com o tratamento dos meus dados pessoais. *</label>
                    <br>
                    <input type="checkbox" name="userGetEmail" id="getEmail" value="accepted" >
                    <label for="userGetEmail">Desejo receber e-mails com novidades, ofertas e comunicações.</label>
                    <br>
                </fieldset>

                <div id="button">
                    <button type="submit">Enviar</button>
                    <button type="reset">Limpar</button>
                </div>


            </form>
        </section>
    </main>


    <footer>

    </footer>
</body>
</html>
